<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Corner reflector</title>
</head>

<style>
    svg {
        width: 500px;
        height: 500px;
    }

    .text {
        font-size: 10px;
        font-family: monospace;
        fill: #666666;
        text-anchor: middle;
    }
</style>
<script>
    window.onload = function () {
        const SIDE_CX = 50;
        const SIDE_CY = 10;
        const SIDE_LEN = 100;

        const svg = document.getElementById('svg');
        const side0 = document.getElementById('side0');
        const side1 = document.getElementById('side1');
        const side2 = document.getElementById('side2');
        const ray1 = document.getElementById('ray1');
        const ray2 = document.getElementById('ray2');

        const point = svg.createSVGPoint();

        function intersect(x1, y1, x2, y2, x3, y3, x4, y4) {
            if ((x1 === x2 && y1 === y2) || (x3 === x4 && y3 === y4)) {
                return false
            }

            const denominator = ((y4 - y3) * (x2 - x1) - (x4 - x3) * (y2 - y1));
            // Lines are parallel
            if (denominator === 0) {
                return false;
            }

            let ua = ((x4 - x3) * (y1 - y3) - (y4 - y3) * (x1 - x3)) / denominator;
            let ub = ((x2 - x1) * (y1 - y3) - (y2 - y1) * (x1 - x3)) / denominator;

            // is the intersection along the segments
            if (ua < 0 || ua > 1 || ub < 0 || ub > 1) {
                return false
            }

            let x = x1 + ua * (x2 - x1);
            let y = y1 + ua * (y2 - y1);

            return {x, y}
        }

        let s1 = {x: 0, y: 0, x0: 50, y0: 10};
        let s2 = {x: 0, y: 0, x0: 50, y0: 10};
        let r1 = {x: 0, y: 0, x0: 50, y0: 90};
        let r2 = {x1: 0, y1: 0, x2: 50, y2: 90};

        let cornerAngle = Math.PI / 2;
        const a34 = 3 * Math.PI / 4;

        function redraw(x, y) {
            const angle = Math.atan2(y - SIDE_CY, x - SIDE_CX);

            if (angle <= -Math.PI / 4 && angle >= -3 * Math.PI / 4) {
                // if (true) {
                cornerAngle = angle;

                side0.setAttribute('x2', 10 * Math.cos(angle) + SIDE_CX);
                side0.setAttribute('y2', 10 * Math.sin(angle) + SIDE_CY);

                s1.x = SIDE_LEN * Math.cos(angle - a34) + s1.x0;
                s1.y = SIDE_LEN * Math.sin(angle - a34) + s1.y0;
                s2.x = SIDE_LEN * Math.cos(angle + a34) + s2.x0;
                s2.y = SIDE_LEN * Math.sin(angle + a34) + s2.y0;

                side1.setAttribute('x2', s1.x);
                side1.setAttribute('y2', s1.y);
                side2.setAttribute('x2', s2.x);
                side2.setAttribute('y2', s2.y);
                redraw(r1.x, r1.y)
            } else {
                const rayAngle = Math.atan2(y - 90, x - SIDE_CX);

                r1.x = 100 * Math.cos(rayAngle) + SIDE_CX;
                r1.y = 100 * Math.sin(rayAngle) + 90;

                let temp1 = intersect(s1.x0, s1.y0, s1.x, s1.y, r1.x0, r1.y0, r1.x, r1.y);

                if (temp1) {
                    ray1.setAttribute('x2', temp1.x);
                    ray1.setAttribute('y2', temp1.y);
                    ray2.setAttribute('x1', temp1.x);
                    ray2.setAttribute('y1', temp1.y);

                    const a = rayAngle + Math.PI + (cornerAngle - a34 - rayAngle - Math.PI / 2) * 2;

                    r2.x2 = 100 * Math.cos(a) + temp1.x;
                    r2.y2 = 100 * Math.sin(a) + temp1.y;

                    ray2.setAttribute('x2', r2.x2);
                    ray2.setAttribute('y2', r2.y2);

                    //let intersectS1R2 = intersect(s1.x0, s1.y0, s1.x, s1.y, r1.x0, r1.y0, r1.x, r1.y);
                } else {

                    let temp2 = intersect(s2.x0, s2.y0, s2.x, s2.y, r1.x0, r1.y0, r1.x, r1.y);
                    if (temp2) {
                        ray1.setAttribute('x2', temp2.x);
                        ray1.setAttribute('y2', temp2.y);
                        ray2.setAttribute('x1', temp2.x);
                        ray2.setAttribute('y1', temp2.y);

                        const a = rayAngle + Math.PI + (cornerAngle + a34 - rayAngle - Math.PI / 2) * 2;

                        console.log(rayAngle, cornerAngle + a34, a);

                        r2.x2 = 100 * Math.cos(a) + temp2.x;
                        r2.y2 = 100 * Math.sin(a) + temp2.y;

                        ray2.setAttribute('x2', r2.x2);
                        ray2.setAttribute('y2', r2.y2);

                    } else {
                        ray1.setAttribute('x2', r1.x);
                        ray1.setAttribute('y2', r1.y);
                    }
                }
            }

        }

        svg.addEventListener('mouseup', function (evt) {
                point.x = evt.clientX;
                point.y = evt.clientY;
                const local = point.matrixTransform(svg.getScreenCTM().inverse());
                redraw(local.x, local.y);
            }
        );

        svg.addEventListener('mousemove', function (evt) {
                if (evt.ctrlKey) {
                    point.x = evt.clientX;
                    point.y = evt.clientY;
                    const local = point.matrixTransform(svg.getScreenCTM().inverse());
                    redraw(local.x, local.y);
                }
            }
        );

        redraw(46, 0);

    }
</script>
<body>

<svg id="svg" version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <style>
        #side0, #side1, #side2 {
            fill: none;
            stroke: #000;
            stroke-width: 1;
        }

        #ray1, #ray2, #ray3 {
            fill: none;
            stroke: #F00;
            stroke-width: 1;
        }
    </style>

    <defs>
        <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
            <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#DADADA" stroke-width="0.3"/>
        </pattern>
    </defs>

    <rect width="100%" height="100%" fill="url(#grid)"/>

    <path d="M 50 10 L 60 0 L 40 0 Z"
          fill="green" fill-opacity="0.25"
          stroke-dasharray="1" stroke="gray" stroke-width="0.25" stroke-linejoin="round"
          cursor="crosshair"/>

    <line id="side0" x1="50" y1="10" x2="50" y2="10"></line>
    <line id="side1" x1="50" y1="10" x2="10" y2="10" style="stroke: blue"></line>
    <line id="side2" x1="50" y1="10" x2="90" y2="10"></line>

    <line id="ray1" x1="50" y1="90" x2="50" y2="10"></line>
    <line id="ray2" x1="50" y1="90" x2="50" y2="90"></line>
    <line id="ray3" x1="50" y1="90" x2="50" y2="90"></line>
</svg>

</body>
</html>
