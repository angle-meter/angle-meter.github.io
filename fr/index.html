<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Angle mètre en ligne</title>
    <meta name="description" content="Outil de mesure d'angle en ligne">

    <meta name="keywords" content="angle, rapporteur, degré, mètre, mesure, en ligne">
    <meta name="author" content="Xantorohara"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/snap.svg/0.5.1/snap.svg-min.js"></script>

    <script src="/yandex_metrika.js?20190208"></script>

    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" type="text/css" href="/styles.css?20190209"/>
    <script src="/scripts.js?20190209"></script>
</head>

<script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "url": "https://angle-meter.github.io/",
        "logo": "https://angle-meter.github.io/logo.png"
    }
</script>

<body>


<div id="svg-container">
    <h1 id="title">
        Angle mètre
    </h1>

    <svg version="1.1" xmlns="http://www.w3.org/2000/svg" id="svg" viewBox="0 0 40 40" class="noselect">

        <style>
            .supp-line {
                fill: none;
                stroke: #666666;
                stroke-width: 0.02px;
            }

            .supp-text {
                font-size: 1px;
                font-family: monospace;
                fill: #666666;
                alignment-baseline: middle;
            }

            .a-line {
                fill: none;
                stroke: #333333;
                stroke-width: 0.1px;
            }

            .a-text {
                font-size: 1px;
                font-family: monospace;
                fill: #404040;
                alignment-baseline: middle;
                text-anchor: middle;
            }

            .a-path {
                stroke: #404040;
                stroke-width: 0.05px;
                fill-opacity: 0.5;
            }

        </style>

        <circle class="supp-line" cx="20" cy="20" r="17"></circle>
        <line class="supp-line" x1="2" y1="20" x2="38" y2="20"></line>
        <line class="supp-line" x1="20" y1="2" x2="20" y2="38"></line>
        <line class="supp-line" x1="5" y1="5" x2="35" y2="35"></line>
        <line class="supp-line" x1="5" y1="35" x2="35" y2="5"></line>
        <text class="supp-text" x="36" y="19" text-anchor="end">0</text>
        <text class="supp-text" x="36" y="21" text-anchor="end">360</text>
        <text class="supp-text" x="21" y="4" text-anchor="start">90</text>
        <text class="supp-text" x="4" y="19" text-anchor="start">180</text>
        <text class="supp-text" x="19" y="36" text-anchor="end">270</text>
        <text class="supp-text" x="32" y="10" text-anchor="middle">45</text>
        <text class="supp-text" x="9" y="8" text-anchor="start">135</text>
        <text class="supp-text" x="8" y="30" text-anchor="middle">225</text>
        <text class="supp-text" x="31" y="32" text-anchor="end">315</text>

        <line class="a-line" x1="20" y1="20" x2="38" y2="20"></line>

        <line id="pointerLine" class="a-line" x1="20" y1="20" x2="20" y2="20"></line>

        <path id="pointerMarker" class="a-path" fill="#33CC33" d="M20,20"></path>
        <path id="arc" class="a-path" fill="#0080FF" d="M20,20"></path>
        <path id="oppositeArc" class="a-path" fill="#FF0000" d="M20,20"></path>

        <text id="pointerText" class="a-text" x="20" y="20"></text>
        <text id="arcText" class="a-text" x="20" y="20" style="fill:white"></text>
        <text id="oppositeArcText" class="a-text" x="20" y="20" style="fill:white"></text>

    </svg>

    <div id="input-panel">
        Entrez l'angle en degrés:
        <input id="input" type="number" value="10" min="0">
        <br/>
        ou définir l'angle via un clic de souris
    </div>

    <div id="copy-panel">
        &copy; 2019 <a href="mailto:xantorohara@gmail.com">Xantorohara</a>
        <a href="/">EN</a>
        <a href="/ru/">RU</a>
    </div>

</div>
</body>
</html>
