<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <title>Angle mètre en ligne</title>
    <meta name="description" content="Outil de mesure d'angle en ligne">
    <meta name="keywords" content="angle, rapporteur, degré, mètre, mesure, en ligne">

    <meta name="author" content="Xantorohara"/>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" href=​"https://angle-meter.github.io/favicon.ico" type="image/x-icon">

    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
    <script src="/lib/snap.svg-min.js"></script>
    <script src="/yandex_metrika.js?20190211"></script>

    <link rel="stylesheet" type="text/css" href="/styles.css?20190218"/>
    <script src="/scripts.js?20190218"></script>
</head>

<body>

<div id="svg-container">
    <svg version="1.1" xmlns="http://www.w3.org/2000/svg" id="svg" viewBox="0 0 40 40" class="svg noselect">
        <circle class="svg-supp-line" cx="20" cy="20" r="17"></circle>
        <line class="svg-supp-line" x1="2" y1="20" x2="38" y2="20"></line>
        <line class="svg-supp-line" x1="20" y1="2" x2="20" y2="38"></line>
        <line class="svg-supp-line" x1="5" y1="5" x2="35" y2="35"></line>
        <line class="svg-supp-line" x1="5" y1="35" x2="35" y2="5"></line>
        <text class="svg-supp-text" x="36" y="19" text-anchor="end">0</text>
        <text class="svg-supp-text" x="36" y="21" text-anchor="end">360</text>
        <text class="svg-supp-text" x="21" y="4" text-anchor="start">90</text>
        <text class="svg-supp-text" x="4" y="19" text-anchor="start">180</text>
        <text class="svg-supp-text" x="19" y="36" text-anchor="end">270</text>
        <text class="svg-supp-text" x="32" y="10" text-anchor="middle">45</text>
        <text class="svg-supp-text" x="9" y="8" text-anchor="start">135</text>
        <text class="svg-supp-text" x="8" y="30" text-anchor="middle">225</text>
        <text class="svg-supp-text" x="31" y="32" text-anchor="end">315</text>

        <line class="svg-line" x1="20" y1="20" x2="38" y2="20"></line>

        <line id="pointerLine" class="svg-line" x1="20" y1="20" x2="20" y2="20"></line>

        <path id="pointerMarker" class="svg-path" fill="#33CC33" d="M20,20"></path>
        <path id="arc" class="svg-path" fill="#0080FF" d="M20,20"></path>
        <path id="oppositeArc" class="svg-path" fill="#FF0000" d="M20,20"></path>

        <text id="pointerText" class="svg-text" x="20" y="20"></text>
        <text id="arcText" class="svg-text" x="20" y="20" style="fill:white"></text>
        <text id="oppositeArcText" class="svg-text" x="20" y="20" style="fill:white"></text>
    </svg>

    <h1 id="title">
        Angle mètre
    </h1>

    <div id="input-panel">
        Entrez l'angle en degrés
        <input id="input" type="number" min="0">
        <br/>
        ou définir l'angle via un clic de souris
    </div>
</div>

<div style="width: 75%; margin: 20px auto">
    <p style="text-align: center; margin-top: 20px">
        &copy; 2019 <a href="mailto:xantorohara@gmail.com">Xantorohara</a>
        <a href="/">EN</a>
        <a href="/ru/">RU</a>
        <a href="/fr/">FR</a>
    </p>
</div>
</body>
</html>
