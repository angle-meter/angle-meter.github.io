<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Units</title>
</head>

<style>
    svg {
        width: 297px;
        height: 297px;
    }

    .line {
        fill: #EEE;
        stroke: #CCC;
        stroke-width: 0.5px;
    }

    .arc {
        stroke-width: 0.5px;
    }

    .arc:nth-child(even) {
        fill: #08F;
        stroke: #333;
        opacity: 0.5;
    }

    .arc:nth-child(odd) {
        fill: #FFF;
        stroke: #999;
    }

    .text {
        font-size: 10px;
        font-family: monospace;
        fill: #666666;
        text-anchor: middle;
    }
</style>

<script>
    function sin(angle) {
        return Math.sin(angle * Math.PI / 180);
    }

    function cos(angle) {
        return Math.cos(angle * Math.PI / 180);
    }

    function xy(angle, center, length) {
        var x = center + length * Math.round(cos(angle) * 100) / 100;
        var y = center - length * Math.round(sin(angle) * 100) / 100;
        return {x: x, y: y}
    }

    function arcPaths(angle, center, radius, rotate) {
        var xy1 = xy((90 - angle) * 0.5, center, radius);
        var xy2 = xy(angle + (90 - angle) * 0.5, center, radius);
        return '<path class="arc" d="' +
            ' M' + center + ',' + center +
            ' L' + xy1.x + ',' + xy1.y +
            ' A' + radius * 2 + ',' + radius * 2 + ',0,0,0,' + xy2.x + ',' + xy2.y + ' Z" ' +
            ' transform="rotate(' + rotate + ' ' + 50 + ' ' + 50 + ') translate(1 -1) "></path>';
    }
</script>

<body>

<svg1 version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 99 99">
    <circle class="line" cx="50" cy="50" r="45"></circle>

    <line class="line" x1="0" y1="50" x2="99" y2="50"></line>
    <line class="line" x1="0" y1="50" x2="99" y2="50" transform="rotate(90 50 50)"></line>

    <g>
        <script>
            for (var i = 0; i < 4; i++) {
                document.write(arcPaths(90, 50, 30, i * 90));
            }
        </script>
    </g>

    <text class="text" x="50" y="15" transform="rotate(45 50 50)">Q1</text>
    <text class="text" x="50" y="15" transform="rotate(-45 50 50)">Q2</text>
    <text class="text" x="50" y="91" transform="rotate(45 50 50)">Q3</text>
    <text class="text" x="50" y="91" transform="rotate(-45 50 50)">Q4</text>

</svg1>

<svg1 version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 99 99">

    <circle class="line" cx="50" cy="50" r="45"></circle>

    <line class="line" x1="0" y1="50" x2="99" y2="50"></line>
    <line class="line" x1="0" y1="50" x2="99" y2="50" transform="rotate(60 50 50)"></line>
    <line class="line" x1="0" y1="50" x2="99" y2="50" transform="rotate(120 50 50)"></line>

    <g>
        <script>
            for (var i = 0; i < 6; i++) {
                document.write(arcPaths(60, 50, 30, i * 60 + 15));
            }
        </script>
    </g>

    <text class="text" x="50" y="14" transform="rotate(60 50 50)">1</text>
    <text class="text" x="50" y="14" transform="rotate(0 50 50)">2</text>
    <text class="text" x="50" y="14" transform="rotate(-60 50 50)">3</text>

    <text class="text" x="50" y="92" transform="rotate(60 50 50)">4</text>
    <text class="text" x="50" y="92" transform="rotate(0 50 50)">5</text>
    <text class="text" x="50" y="92" transform="rotate(-60 50 50)">6</text>

</svg1>

<svg1 version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 99 99">
    <circle class="line" cx="50" cy="50" r="45"></circle>

    <line class="line" x1="0" y1="50" x2="99" y2="50"></line>
    <line class="line" x1="0" y1="50" x2="99" y2="50" transform="rotate(45 50 50)"></line>
    <line class="line" x1="0" y1="50" x2="99" y2="50" transform="rotate(90 50 50)"></line>
    <line class="line" x1="0" y1="50" x2="99" y2="50" transform="rotate(135 50 50)"></line>

    <g>
        <script>
            for (var i = 0; i < 8; i++) {
                document.write(arcPaths(45, 50, 30, i * 45 + 22.5));
            }
        </script>
    </g>
    <text class="text" x="50" y="15" transform="rotate(67 50 50)">1</text>
    <text class="text" x="50" y="15" transform="rotate(23 50 50)">2</text>
    <text class="text" x="50" y="15" transform="rotate(-23 50 50)">3</text>
    <text class="text" x="50" y="15" transform="rotate(-67 50 50)">4</text>
    <text class="text" x="50" y="91" transform="rotate(67 50 50)">5</text>
    <text class="text" x="50" y="91" transform="rotate(23 50 50)">6</text>
    <text class="text" x="50" y="91" transform="rotate(-23 50 50)">7</text>
    <text class="text" x="50" y="91" transform="rotate(-67 50 50)">8</text>

</svg1>

<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 99 99">

    <circle class="line" cx="50" cy="50" r="45"></circle>

    <line class="line" x1="0" y1="50" x2="99" y2="50"></line>
    <line class="line" x1="0" y1="50" x2="99" y2="50" transform="rotate(90 50 50)"></line>
    <line class="line" x1="0" y1="50" x2="99" y2="50" transform="rotate(60 50 50)"></line>
    <line class="line" x1="0" y1="50" x2="99" y2="50" transform="rotate(30 50 50)"></line>
    <line class="line" x1="0" y1="50" x2="99" y2="50" transform="rotate(-30 50 50)"></line>
    <line class="line" x1="0" y1="50" x2="99" y2="50" transform="rotate(-60 50 50)"></line>

    <g>
        <script>
            for (var i = 0; i < 12; i++) {
                document.write(arcPaths(30, 50, 30, i * 30 - 30));
            }
        </script>
    </g>

    <text class="text" x="50" y="14" transform="rotate(30 50 50)">1</text>
    <text class="text" x="50" y="14" transform="rotate(60 50 50)">2</text>
    <text class="text" x="90" y="53" font-weight="bold">3</text>


    <text class="text" x="50" y="92" transform="rotate(-60 50 50)">4</text>
    <text class="text" x="50" y="92" transform="rotate(-30 50 50)">5</text>
    <text class="text" x="50" y="92" font-weight="bold">6</text>

    <text class="text" x="50" y="92" transform="rotate(30 50 50)">7</text>
    <text class="text" x="50" y="92" transform="rotate(60 50 50)">8</text>
    <text class="text" x="10" y="53" font-weight="bold">9</text>

    <text class="text" x="50" y="14" transform="rotate(-60 50 50)">10</text>
    <text class="text" x="50" y="14" transform="rotate(-30 50 50)">11</text>
    <text class="text" x="50" y="14" font-weight="bold">12</text>

</svg>

<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 99 99">

    <circle class="line" cx="50" cy="50" r="45"></circle>

    <style>
        .line1 {
            stroke-width: 0.1px;
        }

        .line1:nth-child(even) {
            stroke: #FFF;
        }

        .line1:nth-child(odd) {
            stroke: #000;
        }
    </style>
    <g>
        <script><![CDATA[
        for (var i = 0; i < 180; i++) {
            document.write('<line class="line1" x1="1" y1="50" x2="99" y2="50" transform="rotate(' + -i + ' 50 50)"></line>');
        }
        ]]></script>
    </g>

    <circle class="line" cx="50" cy="50" r="20"></circle>

    <text class="text" x="50" y="53">1..360°</text>
</svg>
</body>
</html>
